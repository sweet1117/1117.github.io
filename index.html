<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 探照灯 - 实时手势交互</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --accent: #e8a850;
            --accent2: #c9a96e;
            --text: #e0d5c1;
            --text-secondary: #b0a590;
            --danger: #c0392b;
            --success: #27ae60;
            --radius: 14px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding: 12px;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 4/3;
            max-height: 75vh;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            background: #000;
            cursor: none;
            transition: var(--transition);
        }
        @media (max-width: 768px) {
            .main-container {
                max-width: 100%;
                max-height: 55vh;
                border-radius: 10px;
            }
        }

        /* 主画布 */
        #mainCanvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #111;
        }

        /* 状态指示器 */
        .status-indicator {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #fff;
            pointer-events: none;
            z-index: 10;
            transition: var(--transition);
            letter-spacing: 0.3px;
        }
        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #555;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .status-dot.active {
            background: #4fda6e;
            box-shadow: 0 0 12px #4fda6e88;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        .status-dot.warning {
            background: #f0a040;
            box-shadow: 0 0 10px #f0a04066;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 8px currentColor;
            }
            50% {
                box-shadow: 0 0 20px currentColor, 0 0 32px currentColor;
            }
        }

        /* 手部计数徽标 */
        .hand-count-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 16px;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 0.4px;
            transition: var(--transition);
        }
        .hand-count-badge span {
            font-weight: 700;
            color: var(--accent);
            font-size: 16px;
        }

        /* 控制面板 */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        @media (max-width: 600px) {
            .controls {
                gap: 7px;
                margin-top: 10px;
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            letter-spacing: 0.4px;
            transition: var(--transition);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: var(--accent);
            color: #1a1a2e;
            box-shadow: 0 4px 16px rgba(200, 150, 60, 0.35);
        }
        .btn-primary:hover {
            background: #f0b860;
            box-shadow: 0 6px 24px rgba(210, 155, 55, 0.5);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #ddd;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }
        .btn-icon {
            font-size: 17px;
            line-height: 1;
        }
        .btn-sm {
            padding: 7px 14px;
            font-size: 12px;
            border-radius: 20px;
            gap: 5px;
        }

        /* 上传标签样式 */
        .upload-label {
            cursor: pointer;
            position: relative;
        }
        .upload-label input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        /* 提示文字 */
        .hint-text {
            color: var(--text-secondary);
            font-size: 12px;
            text-align: center;
            margin-top: 6px;
            letter-spacing: 0.3px;
            transition: var(--transition);
        }

        /* 羽化调节滑块 */
        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 12px;
            letter-spacing: 0.3px;
        }
        .slider-group input[type="range"] {
            -webkit-appearance: none;
            width: 80px;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.25);
            outline: none;
            cursor: pointer;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* 摄像头预览小窗 */
        .camera-preview {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 100px;
            height: 75px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            z-index: 10;
            pointer-events: none;
            opacity: 0.75;
            transition: var(--transition);
            background: #000;
        }
        .camera-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        @media (max-width: 600px) {
            .camera-preview {
                width: 64px;
                height: 48px;
                bottom: 8px;
                right: 8px;
                border-radius: 8px;
            }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .btn {
                padding: 8px 13px;
                font-size: 12px;
                border-radius: 20px;
                gap: 4px;
            }
            .btn-icon {
                font-size: 15px;
            }
            .status-indicator {
                font-size: 11px;
                padding: 6px 12px;
                top: 8px;
            }
            .hand-count-badge {
                font-size: 11px;
                padding: 5px 10px;
                top: 8px;
                right: 8px;
            }
            .slider-group input[type="range"] {
                width: 50px;
            }
        }
    </style>
</head>
<body>

    <!-- 主容器 -->
    <div class="main-container" id="mainContainer">
        <!-- 主画布 -->
        <canvas id="mainCanvas"></canvas>

        <!-- 状态指示器 -->
        <div class="status-indicator" id="statusIndicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">初始化中...</span>
        </div>

        <!-- 手部计数 -->
        <div class="hand-count-badge" id="handBadge">
            🖐 检测到 <span id="handCount">0</span> 只手
        </div>

        <!-- 摄像头预览 -->
        <div class="camera-preview" id="cameraPreview">
            <video id="previewVideo" muted playsinline></video>
        </div>
    </div>

    <!-- 控制面板 -->
    <div class="controls" id="controls">
        <!-- 上传底图 -->
        <label class="btn btn-secondary upload-label" title="上传底图（光圈外的背景图层）">
            <span class="btn-icon">🖼️</span> 上传底图
            <input type="file" id="bgUpload" accept="image/*">
        </label>

        <!-- 上传蒙版 -->
        <label class="btn btn-secondary upload-label" title="上传蒙版（光圈内显示的图层）">
            <span class="btn-icon">🎭</span> 上传蒙版
            <input type="file" id="maskUpload" accept="image/*">
        </label>

        <!-- 重置 -->
        <button class="btn btn-secondary btn-sm" id="resetBtn" title="恢复默认图片">
            <span class="btn-icon">↺</span> 重置
        </button>

        <!-- 羽化调节 -->
        <div class="slider-group">
            <span>羽化</span>
            <input type="range" id="featherSlider" min="8" max="55" value="28" title="光圈边缘羽化程度">
            <span id="featherValue">28%</span>
        </div>

        <!-- 光圈大小 -->
        <div class="slider-group">
            <span>光圈</span>
            <input type="range" id="radiusSlider" min="50" max="200" value="110" title="光圈基础大小">
            <span id="radiusValue">110px</span>
        </div>
    </div>

    <!-- 提示文字 -->
    <p class="hint-text" id="hintText">
        💡 将手放入摄像头视野，移动手部来控制探照灯光圈 | 若无摄像头，移动鼠标亦可体验
    </p>

    <!-- 隐藏的视频元素（用于MediaPipe处理） -->
    <video id="hiddenVideo" style="display:none;" playsinline></video>

    <!-- MediaPipe Hands CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js"
    crossorigin="anonymous">
</script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6.1675466023/control_utils.js"
crossorigin="anonymous">
</script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js"
crossorigin="anonymous">
</script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"
crossorigin="anonymous">
</script>

<script>
    (function() {
        // ==================== DOM 元素 ====================
        const mainCanvas = document.getElementById('mainCanvas');
        const ctx = mainCanvas.getContext('2d');
        const mainContainer = document.getElementById('mainContainer');
        const hiddenVideo = document.getElementById('hiddenVideo');
        const previewVideo = document.getElementById('previewVideo');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const handCountEl = document.getElementById('handCount');
        const handBadge = document.getElementById('handBadge');
        const hintText = document.getElementById('hintText');
        const bgUpload = document.getElementById('bgUpload');
        const maskUpload = document.getElementById('maskUpload');
        const resetBtn = document.getElementById('resetBtn');
        const featherSlider = document.getElementById('featherSlider');
        const featherValue = document.getElementById('featherValue');
        const radiusSlider = document.getElementById('radiusSlider');
        const radiusValue = document.getElementById('radiusValue');
        const cameraPreviewDiv = document.getElementById('cameraPreview');

        // ==================== 状态变量 ====================
        let bgImage = null; // 底图 Image 对象
        let maskImage = null; // 蒙版 Image 对象
        let canvasWidth = 640;
        let canvasHeight = 480;
        let detectedHands = []; // 当前检测到的手部数据 [{cx, cy, radius, handedness, confidence}]
        let smoothedHands = []; // 平滑后的手部数据
        let cameraActive = false;
        let mouseMode = false; // 是否使用鼠标模拟
        let mousePos = null; // 鼠标在canvas上的位置 {x, y}
        let mouseInCanvas = false;
        let handsInstance = null;
        let cameraInstance = null;
        let animationId = null;
        let offscreenCanvas = null;
        let offscreenCtx = null;
        let lastHandDetectionTime = 0;
        const HAND_TIMEOUT_MS = 600; // 手部超时时间

        // 用户可调参数
        let featherPercent = 28; // 羽化占光圈半径的百分比
        let baseRadius = 110; // 基础光圈半径（像素）

        // ==================== 创建默认图片 ====================
        function createDefaultBgImage() {
            const c = document.createElement('canvas');
            c.width = canvasWidth;
            c.height = canvasHeight;
            const cx = c.getContext('2d');

            // 深色星空背景
            const bgGrad = cx.createRadialGradient(canvasWidth * 0.3, canvasHeight * 0.35, canvasWidth * 0.1,
                canvasWidth * 0.5, canvasHeight * 0.5, canvasWidth * 0.9);
            bgGrad.addColorStop(0, '#1a2a3a');
            bgGrad.addColorStop(0.5, '#0d1b2a');
            bgGrad.addColorStop(1, '#050d15');
            cx.fillStyle = bgGrad;
            cx.fillRect(0, 0, canvasWidth, canvasHeight);

            // 星星
            const starCount = 180;
            for (let i = 0; i < starCount; i++) {
                const sx = Math.random() * canvasWidth;
                const sy = Math.random() * canvasHeight;
                const sr = Math.random() * 1.8 + 0.3;
                const alpha = Math.random() * 0.7 + 0.2;
                cx.beginPath();
                cx.arc(sx, sy, sr, 0, Math.PI * 2);
                cx.fillStyle = `rgba(200,210,240,${alpha})`;
                cx.fill();
            }

            // 一些稍大的亮星
            for (let i = 0; i < 25; i++) {
                const sx = Math.random() * canvasWidth;
                const sy = Math.random() * canvasHeight;
                const sr = Math.random() * 2.5 + 1;
                cx.beginPath();
                cx.arc(sx, sy, sr, 0, Math.PI * 2);
                cx.fillStyle = `rgba(255,250,235,${Math.random()*0.6+0.4})`;
                cx.fill();
                // 光晕
                const glow = cx.createRadialGradient(sx, sy, sr * 0.3, sx, sy, sr * 3);
                glow.addColorStop(0, 'rgba(255,250,235,0.5)');
                glow.addColorStop(1, 'rgba(255,250,235,0)');
                cx.fillStyle = glow;
                cx.fillRect(sx - sr * 3, sy - sr * 3, sr * 6, sr * 6);
            }

            return c;
        }

        function createDefaultMaskImage() {
            const c = document.createElement('canvas');
            c.width = canvasWidth;
            c.height = canvasHeight;
            const cx = c.getContext('2d');

            // 温暖的金色调蒙版 - 像是被探照灯照亮的世界
            const grad = cx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
            grad.addColorStop(0, '#f5d78c');
            grad.addColorStop(0.35, '#e8b860');
            grad.addColorStop(0.65, '#d4943a');
            grad.addColorStop(1, '#c07828');
            cx.fillStyle = grad;
            cx.fillRect(0, 0, canvasWidth, canvasHeight);

            // 添加纹理
            for (let i = 0; i < 300; i++) {
                const tx = Math.random() * canvasWidth;
                const ty = Math.random() * canvasHeight;
                const tr = Math.random() * 20 + 3;
                const alpha = Math.random() * 0.08;
                cx.beginPath();
                cx.arc(tx, ty, tr, 0, Math.PI * 2);
                cx.fillStyle = `rgba(255,255,255,${alpha})`;
                cx.fill();
            }

            // 一些流动的色块
            for (let i = 0; i < 12; i++) {
                const bx = Math.random() * canvasWidth;
                const by = Math.random() * canvasHeight;
                const br = Math.random() * 80 + 30;
                const bgrad = cx.createRadialGradient(bx, by, 0, bx, by, br);
                const hue = Math.random() * 40 + 25;
                bgrad.addColorStop(0, `rgba(255,240,210,0.3)`);
                bgrad.addColorStop(1, `rgba(200,150,80,0)`);
                cx.fillStyle = bgrad;
                cx.fillRect(bx - br, by - br, br * 2, br * 2);
            }

            return c;
        }

        function loadDefaultImages() {
            const bgCanvas = createDefaultBgImage();
            bgImage = new Image();
            bgImage.src = bgCanvas.toDataURL();

            const maskCanvas = createDefaultMaskImage();
            maskImage = new Image();
            maskImage.src = maskCanvas.toDataURL();

            // 等待图片加载
            return Promise.all([
                new Promise(r => { bgImage.onload = r;
                    bgImage.onerror = r; }),
                new Promise(r => { maskImage.onload = r;
                    maskImage.onerror = r; })
            ]).then(() => {
                console.log('默认图片已生成');
            });
        }

        // ==================== 上传处理 ====================
        function handleImageUpload(file, type) {
            return new Promise((resolve, reject) => {
                if (!file || !file.type.startsWith('image/')) {
                    reject(new Error('请上传图片文件'));
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        if (type === 'bg') {
                            bgImage = img;
                            console.log('底图已更新:', file.name, `${img.width}x${img.height}`);
                        } else {
                            maskImage = img;
                            console.log('蒙版已更新:', file.name, `${img.width}x${img.height}`);
                        }
                        resolve(img);
                    };
                    img.onerror = () => reject(new Error('图片加载失败'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsDataURL(file);
            });
        }

        bgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleImageUpload(file, 'bg').catch(err => {
                    alert('底图上传失败: ' + err.message);
                });
            }
            bgUpload.value = '';
        });

        maskUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleImageUpload(file, 'mask').catch(err => {
                    alert('蒙版上传失败: ' + err.message);
                });
            }
            maskUpload.value = '';
        });

        resetBtn.addEventListener('click', async () => {
            await loadDefaultImages();
            hintText.textContent = '✅ 已恢复默认图片 | 💡 移动手部或鼠标来探索光圈效果';
            setTimeout(() => {
                hintText.textContent =
                    '💡 将手放入摄像头视野，移动手部来控制探照灯光圈 | 若无摄像头，移动鼠标亦可体验';
            }, 2000);
        });

        // ==================== 羽化和光圈大小调节 ====================
        featherSlider.addEventListener('input', () => {
            featherPercent = parseInt(featherSlider.value);
            featherValue.textContent = featherPercent + '%';
        });
        radiusSlider.addEventListener('input', () => {
            baseRadius = parseInt(radiusSlider.value);
            radiusValue.textContent = baseRadius + 'px';
        });

        // ==================== Canvas尺寸管理 ====================
        function updateCanvasSize() {
            const rect = mainContainer.getBoundingClientRect();
            const containerWidth = rect.width;
            const containerHeight = rect.height;

            // 保持内部分辨率，CSS处理显示
            mainCanvas.style.width = containerWidth + 'px';
            mainCanvas.style.height = containerHeight + 'px';

            // 更新摄像头预览大小
            if (containerWidth < 500) {
                cameraPreviewDiv.style.width = '56px';
                cameraPreviewDiv.style.height = '42px';
            } else if (containerWidth < 768) {
                cameraPreviewDiv.style.width = '75px';
                cameraPreviewDiv.style.height = '56px';
            } else {
                cameraPreviewDiv.style.width = '100px';
                cameraPreviewDiv.style.height = '75px';
            }
        }

        // ==================== 鼠标模拟 ====================
        function getMouseCanvasPos(e) {
            const rect = mainCanvas.getBoundingClientRect();
            const scaleX = canvasWidth / rect.width;
            const scaleY = canvasHeight / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        mainCanvas.addEventListener('mousemove', (e) => {
            if (mouseMode) {
                mousePos = getMouseCanvasPos(e);
                mouseInCanvas = true;
            }
        });
        mainCanvas.addEventListener('mouseenter', () => {
            if (mouseMode) mouseInCanvas = true;
        });
        mainCanvas.addEventListener('mouseleave', () => {
            mouseInCanvas = false;
            mousePos = null;
        });
        // 触摸支持
        mainCanvas.addEventListener('touchmove', (e) => {
            if (mouseMode && e.touches.length > 0) {
                e.preventDefault();
                mousePos = getMouseCanvasPos(e.touches[0]);
                mouseInCanvas = true;
            }
        }, { passive: false });
        mainCanvas.addEventListener('touchend', () => {
            if (mouseMode) {
                mouseInCanvas = false;
                mousePos = null;
            }
        });

        // ==================== 绘制辅助函数 ====================
        function drawImageCover(ctx, img, cw, ch) {
            if (!img || !img.complete || img.naturalWidth === 0) return;
            const imgRatio = img.naturalWidth / img.naturalHeight;
            const canvasRatio = cw / ch;
            let dw, dh, dx, dy;
            if (imgRatio > canvasRatio) {
                // 图片更宽，按高度填充
                dh = ch;
                dw = dh * imgRatio;
                dx = -(dw - cw) / 2;
                dy = 0;
            } else {
                // 图片更高，按宽度填充
                dw = cw;
                dh = dw / imgRatio;
                dx = 0;
                dy = -(dh - ch) / 2;
            }
            ctx.drawImage(img, dx, dy, dw, dh);
        }

        // ==================== 渲染循环 ====================
        function render() {
            const cw = canvasWidth;
            const ch = canvasHeight;

            // 清除主画布
            ctx.clearRect(0, 0, cw, ch);

            // 1. 绘制底图
            if (bgImage && bgImage.complete && bgImage.naturalWidth > 0) {
                drawImageCover(ctx, bgImage, cw, ch);
            } else {
                // 回退纯色
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, cw, ch);
            }

            // 2. 收集光圈位置
            let spotlightSources = [];

            if (cameraActive && !mouseMode && detectedHands.length > 0) {
                // 使用摄像头检测的手部
                spotlightSources = detectedHands.map(h => ({
                    cx: h.cx * cw,
                    cy: h.cy * ch,
                    radius: h.radius || baseRadius,
                }));
            } else if (mouseMode && mouseInCanvas && mousePos) {
                // 鼠标模拟
                spotlightSources = [{
                    cx: mousePos.x,
                    cy: mousePos.y,
                    radius: baseRadius,
                }];
            }

            // 3. 对每个光圈源，绘制蒙版
            if (spotlightSources.length > 0 && maskImage && maskImage.complete && maskImage.naturalWidth > 0) {
                // 确保离屏canvas存在且尺寸正确
                if (!offscreenCanvas || offscreenCanvas.width !== cw || offscreenCanvas.height !== ch) {
                    offscreenCanvas = document.createElement('canvas');
                    offscreenCanvas.width = cw;
                    offscreenCanvas.height = ch;
                    offscreenCtx = offscreenCanvas.getContext('2d');
                }

                for (const source of spotlightSources) {
                    const { cx, cy, radius } = source;
                    const featherRadius = radius * (featherPercent / 100);
                    const innerRadius = radius - featherRadius;
                    const outerRadius = radius;

                    if (outerRadius <= 0) continue;

                    // 清除离屏canvas
                    offscreenCtx.clearRect(0, 0, cw, ch);

                    // 在离屏canvas上绘制蒙版（cover模式）
                    drawImageCover(offscreenCtx, maskImage, cw, ch);

                    // 创建径向渐变遮罩
                    const gradient = offscreenCtx.createRadialGradient(cx, cy, Math.max(0, innerRadius), cx, cy,
                        outerRadius);
                    gradient.addColorStop(0, 'rgba(255,255,255,1)');
                    gradient.addColorStop(0.85, 'rgba(255,255,255,0.95)');
                    gradient.addColorStop(1, 'rgba(255,255,255,0)');

                    // 应用遮罩（destination-in：保留蒙版中与渐变重叠的部分）
                    offscreenCtx.globalCompositeOperation = 'destination-in';
                    offscreenCtx.fillStyle = gradient;
                    offscreenCtx.fillRect(0, 0, cw, ch);

                    // 重置合成模式
                    offscreenCtx.globalCompositeOperation = 'source-over';

                    // 将结果绘制到主canvas
                    ctx.drawImage(offscreenCanvas, 0, 0);
                }
            }

            // 4. 如果没有光圈源且没有蒙版，显示提示
            if (spotlightSources.length === 0 && (!maskImage || maskImage.naturalWidth === 0)) {
                // 在画面中央显示柔和的提示
                ctx.fillStyle = 'rgba(255,255,255,0.06)';
                ctx.beginPath();
                ctx.arc(cw / 2, ch / 2, 100, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '18px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('移动手部或鼠标来探索', cw / 2, ch / 2 + 40);
                ctx.textAlign = 'start';
            }

            animationId = requestAnimationFrame(render);
        }

        // ==================== MediaPipe Hands ====================
        function initMediaPipe() {
            if (typeof Hands === 'undefined') {
                console.warn('MediaPipe Hands 库未加载，切换到鼠标模式');
                switchToMouseMode('MediaPipe库加载失败');
                return;
            }

            handsInstance = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`;
                }
            });

            handsInstance.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.5,
            });

            handsInstance.onResults(onHandResults);

            // 启动摄像头
            if (typeof Camera === 'undefined') {
                console.warn('Camera utils 未加载，切换到鼠标模式');
                switchToMouseMode('摄像头工具加载失败');
                return;
            }

            cameraInstance = new Camera(hiddenVideo, {
                onFrame: async () => {
                    if (handsInstance && cameraActive) {
                        try {
                            await handsInstance.send({ image: hiddenVideo });
                        } catch (err) {
                            console.warn('MediaPipe处理帧时出错:', err.message);
                        }
                    }
                },
                width: canvasWidth,
                height: canvasHeight,
                facingMode: 'user',
            });

            cameraInstance.start().then(() => {
                cameraActive = true;
                mouseMode = false;
                updateStatus('active', 'AI摄像头已就绪');
                hintText.textContent = '✅ AI手势追踪已激活 | 将手放入摄像头视野，移动手部控制探照灯';
                // 同步预览视频
                previewVideo.srcObject = hiddenVideo.srcObject;
                cameraPreviewDiv.style.display = 'block';
                console.log('摄像头已启动，MediaPipe Hands 正在运行');
            }).catch((err) => {
                console.warn('摄像头启动失败:', err.message);
                switchToMouseMode('摄像头权限未授予或不可用');
            });
        }

        function onHandResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                // 没有检测到手，检查是否超时
                if (Date.now() - lastHandDetectionTime > HAND_TIMEOUT_MS) {
                    detectedHands = [];
                }
                updateHandCountUI(0);
                return;
            }

            lastHandDetectionTime = Date.now();
            const newDetectedHands = [];

            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const landmarks = results.multiHandLandmarks[i];
                const handedness = results.multiHandedness ?
                    (results.multiHandedness[i] ? results.multiHandedness[i].label : 'Unknown') :
                    'Unknown';

                // 计算手掌中心（手腕 + 手指根部的平均值）
                const wrist = landmarks[0];
                const indexBase = landmarks[5];
                const middleBase = landmarks[9];
                const ringBase = landmarks[13];
                const pinkyBase = landmarks[17];
                const middleTip = landmarks[12];

                const palmCx = (wrist.x + indexBase.x + middleBase.x + ringBase.x + pinkyBase.x) / 5;
                const palmCy = (wrist.y + indexBase.y + middleBase.y + ringBase.y + pinkyBase.y) / 5;

                // 镜像x坐标（前置摄像头）
                const mirroredCx = 1 - palmCx;

                // 计算手的大小（手腕到中指指尖的距离）
                const handSize = Math.sqrt(
                    (middleTip.x - wrist.x) ** 2 + (middleTip.y - wrist.y) ** 2
                );
                // 转换为像素并缩放
                const handSizePx = handSize * Math.max(canvasWidth, canvasHeight);
                const dynamicRadius = Math.max(40, Math.min(200, handSizePx * 1.6));

                newDetectedHands.push({
                    cx: mirroredCx,
                    cy: palmCy,
                    radius: dynamicRadius,
                    handedness: handedness,
                    confidence: results.multiHandedness ?
                        (results.multiHandedness[i] ? results.multiHandedness[i].score : 0) : 0,
                });
            }

            // 平滑处理
            if (smoothedHands.length === 0) {
                smoothedHands = newDetectedHands.map(h => ({ ...h }));
            } else {
                // 匹配手部（通过handedness）
                const newSmoothed = [];
                for (const newHand of newDetectedHands) {
                    const existing = smoothedHands.find(h => h.handedness === newHand.handedness);
                    const alpha = 0.35; // 平滑系数
                    if (existing) {
                        newSmoothed.push({
                            ...newHand,
                            cx: existing.cx * (1 - alpha) + newHand.cx * alpha,
                            cy: existing.cy * (1 - alpha) + newHand.cy * alpha,
                            radius: existing.radius * (1 - alpha) + newHand.radius * alpha,
                        });
                    } else {
                        newSmoothed.push({ ...newHand });
                    }
                }
                smoothedHands = newSmoothed;
            }

            detectedHands = smoothedHands;
            updateHandCountUI(detectedHands.length);
        }

        function updateHandCountUI(count) {
            handCountEl.textContent = count;
            if (count > 0) {
                handBadge.style.opacity = '1';
                handBadge.style.transform = 'scale(1)';
            } else if (cameraActive) {
                handBadge.style.opacity = '0.5';
            }
        }

        function switchToMouseMode(reason) {
            mouseMode = true;
            cameraActive = false;
            detectedHands = [];
            smoothedHands = [];
            updateStatus('warning', '鼠标模拟模式');
            hintText.textContent = '🖱️ ' + reason + ' | 移动鼠标到画面上来控制探照灯光圈';
            cameraPreviewDiv.style.display = 'none';
            handBadge.style.opacity = '0.4';
            handCountEl.textContent = '0';
            console.log('已切换到鼠标模拟模式:', reason);
        }

        function updateStatus(state, text) {
            statusDot.className = 'status-dot';
            if (state === 'active') {
                statusDot.classList.add('active');
            } else if (state === 'warning') {
                statusDot.classList.add('warning');
            }
            statusText.textContent = text;
        }

        // ==================== 初始化 ====================
        async function init() {
            updateCanvasSize();
            updateStatus('warning', '正在初始化...');

            // 加载默认图片
            await loadDefaultImages();

            // 设置canvas内部分辨率
            mainCanvas.width = canvasWidth;
            mainCanvas.height = canvasHeight;

            // 创建离屏canvas
            offscreenCanvas = document.createElement('canvas');
            offscreenCanvas.width = canvasWidth;
            offscreenCanvas.height = canvasHeight;
            offscreenCtx = offscreenCanvas.getContext('2d');

            // 尝试初始化MediaPipe
            try {
                initMediaPipe();
            } catch (err) {
                console.error('MediaPipe初始化异常:', err);
                switchToMouseMode('初始化异常');
            }

            // 如果3秒后摄像头仍未激活，切换到鼠标模式
            setTimeout(() => {
                if (!cameraActive && !mouseMode) {
                    switchToMouseMode('摄像头启动超时');
                }
            }, 4000);

            // 启动渲染循环
            render();

            // 监听窗口大小变化
            window.addEventListener('resize', () => {
                updateCanvasSize();
            });

            // 初始状态更新
            updateHandCountUI(0);
            handBadge.style.opacity = '0.5';

            console.log('AI探照灯系统初始化完成');
            console.log('  - 画布分辨率:', canvasWidth, 'x', canvasHeight);
            console.log('  - 默认模式:', '尝试摄像头 + MediaPipe Hands');
            console.log('  - 回退模式:', '鼠标模拟');
        }

        // ==================== 清理 ====================
        function cleanup() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            if (cameraInstance && cameraActive) {
                try {
                    cameraInstance.stop();
                } catch (e) { /* ignore */ }
                cameraActive = false;
            }
            if (handsInstance) {
                try {
                    handsInstance.close();
                } catch (e) { /* ignore */ }
                handsInstance = null;
            }
            if (hiddenVideo && hiddenVideo.srcObject) {
                const tracks = hiddenVideo.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                hiddenVideo.srcObject = null;
            }
            console.log('资源已清理');
        }

        window.addEventListener('beforeunload', cleanup);
        window.addEventListener('pagehide', cleanup);

        // ==================== 启动应用 ====================
        init().catch(err => {
            console.error('初始化失败:', err);
            switchToMouseMode('系统初始化失败，使用鼠标模式');
            updateStatus('warning', '鼠标模拟模式');
            // 确保渲染循环在运行
            if (!animationId) {
                render();
            }
        });

        // 暴露一些方法到全局作用域用于调试
        window.__spotlightDebug = {
            getState: () => ({
                cameraActive,
                mouseMode,
                detectedHandsCount: detectedHands.length,
                smoothedHandsCount: smoothedHands.length,
                hasBgImage: !!bgImage && bgImage.complete && bgImage.naturalWidth > 0,
                hasMaskImage: !!maskImage && maskImage.complete && maskImage.naturalWidth > 0,
                canvasWidth,
                canvasHeight,
                featherPercent,
                baseRadius,
            }),
            switchToMouse: switchToMouseMode,
            resetImages: () => loadDefaultImages(),
        };

        console.log('%c🪄 AI探照灯系统已就绪 %c| %c调试接口: window.__spotlightDebug.getState()',
            'font-size:14px;color:#e8a850;', '', 'color:#aaa;');
        console.log('%c  支持手势追踪(MediaPipe Hands) + 鼠标回退模式',
            'color:#b0a590;font-size:12px;');
    })();
</script>
