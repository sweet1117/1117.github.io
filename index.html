<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 探照灯 · 动态蒙版（移动端适配）</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --accent: #e8a850;
            --accent2: #c9a96e;
            --text: #e0d5c1;
            --text-secondary: #b0a590;
            --radius: 14px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding: 12px;
            touch-action: manipulation;
        }

        .main-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 4/3;
            max-height: 75vh;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            background: #000;
            cursor: none;
            transition: var(--transition);
            touch-action: none;
        }
        @media (max-width: 768px) {
            .main-container {
                max-width: 100%;
                max-height: 55vh;
                border-radius: 10px;
            }
        }

        #mainCanvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #111;
        }

        .status-indicator {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #fff;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 0.3px;
        }
        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
        }
        .status-dot.active {
            background: #4fda6e;
            box-shadow: 0 0 12px #4fda6e88;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        .status-dot.warning {
            background: #f0a040;
            box-shadow: 0 0 10px #f0a04066;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 8px currentColor; }
            50% { box-shadow: 0 0 20px currentColor, 0 0 32px currentColor; }
        }

        .hand-count-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 16px;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 0.4px;
        }
        .hand-count-badge span {
            font-weight: 700;
            color: var(--accent);
            font-size: 16px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        @media (max-width: 600px) {
            .controls { gap: 7px; margin-top: 10px; }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            letter-spacing: 0.4px;
            transition: var(--transition);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            font-family: inherit;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary {
            background: var(--accent);
            color: #1a1a2e;
            box-shadow: 0 4px 16px rgba(200, 150, 60, 0.35);
        }
        .btn-primary:hover {
            background: #f0b860;
            box-shadow: 0 6px 24px rgba(210, 155, 55, 0.5);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #ddd;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }
        .btn-icon { font-size: 17px; line-height: 1; }
        .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 20px; gap: 5px; }

        .upload-label {
            cursor: pointer;
            position: relative;
        }
        .upload-label input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        .hint-text {
            color: var(--text-secondary);
            font-size: 12px;
            text-align: center;
            margin-top: 6px;
            letter-spacing: 0.3px;
            padding: 0 8px;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 12px;
            letter-spacing: 0.3px;
        }
        .slider-group input[type="range"] {
            -webkit-appearance: none;
            width: 80px;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.25);
            outline: none;
            cursor: pointer;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .camera-preview {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 100px;
            height: 75px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            z-index: 10;
            pointer-events: none;
            opacity: 0.75;
            background: #000;
        }
        .camera-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        @media (max-width: 600px) {
            .camera-preview { width: 64px; height: 48px; bottom: 8px; right: 8px; border-radius: 8px; }
        }

        @media (max-width: 480px) {
            .btn { padding: 8px 13px; font-size: 12px; border-radius: 20px; gap: 4px; }
            .btn-icon { font-size: 15px; }
            .status-indicator { font-size: 11px; padding: 6px 12px; top: 8px; }
            .hand-count-badge { font-size: 11px; padding: 5px 10px; top: 8px; right: 8px; }
            .slider-group input[type="range"] { width: 50px; }
        }
    </style>
</head>
<body>

    <div class="main-container" id="mainContainer">
        <canvas id="mainCanvas"></canvas>

        <div class="status-indicator" id="statusIndicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">初始化中...</span>
        </div>

        <div class="hand-count-badge" id="handBadge">
            🖐 检测到 <span id="handCount">0</span> 只手
        </div>

        <div class="camera-preview" id="cameraPreview">
            <video id="previewVideo" muted playsinline></video>
        </div>
    </div>

    <div class="controls" id="controls">
        <label class="btn btn-secondary upload-label" title="上传底图（光圈外的背景图层）">
            <span class="btn-icon">🖼️</span> 上传底图
            <input type="file" id="bgUpload" accept="image/*">
        </label>

        <label class="btn btn-secondary upload-label" title="上传蒙版（光圈内显示的图层，支持图片/动图/视频）">
            <span class="btn-icon">🎭</span> 上传蒙版(图片/视频/动图)
            <input type="file" id="maskUpload" accept="image/*,video/*">
        </label>

        <button class="btn btn-secondary btn-sm" id="resetBtn" title="恢复默认图片">
            <span class="btn-icon">↺</span> 重置
        </button>

        <div class="slider-group">
            <span>羽化</span>
            <input type="range" id="featherSlider" min="8" max="55" value="28">
            <span id="featherValue">28%</span>
        </div>

        <div class="slider-group">
            <span>光圈</span>
            <input type="range" id="radiusSlider" min="50" max="200" value="110">
            <span id="radiusValue">110px</span>
        </div>
    </div>

    <p class="hint-text" id="hintText">
        💡 移动手部控制光圈 | 无摄像头则移动鼠标 | 点击画面可激活视频蒙版
    </p>

    <video id="hiddenVideo" style="display:none;" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6.1675466023/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>

    <script>
        (function() {
            const mainCanvas = document.getElementById('mainCanvas');
            const ctx = mainCanvas.getContext('2d');
            const mainContainer = document.getElementById('mainContainer');
            const hiddenVideo = document.getElementById('hiddenVideo');
            const previewVideo = document.getElementById('previewVideo');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const handCountEl = document.getElementById('handCount');
            const handBadge = document.getElementById('handBadge');
            const hintText = document.getElementById('hintText');
            const bgUpload = document.getElementById('bgUpload');
            const maskUpload = document.getElementById('maskUpload');
            const resetBtn = document.getElementById('resetBtn');
            const featherSlider = document.getElementById('featherSlider');
            const featherValue = document.getElementById('featherValue');
            const radiusSlider = document.getElementById('radiusSlider');
            const radiusValue = document.getElementById('radiusValue');
            const cameraPreviewDiv = document.getElementById('cameraPreview');

            let bgImage = null;
            let maskElement = null;
            let maskType = 'image';
            let maskReady = false;
            let maskObjectURL = null;
            let canvasWidth = 640;
            let canvasHeight = 480;
            let detectedHands = [];
            let smoothedHands = [];
            let cameraActive = false;
            let mouseMode = false;
            let mousePos = null;
            let mouseInCanvas = false;
            let handsInstance = null;
            let cameraInstance = null;
            let animationId = null;
            let offscreenCanvas = null;
            let offscreenCtx = null;
            let lastHandDetectionTime = 0;
            const HAND_TIMEOUT_MS = 600;
            let featherPercent = 28;
            let baseRadius = 110;

            // ---------- 默认图片 ----------
            function createDefaultBgImage() {
                const c = document.createElement('canvas');
                c.width = canvasWidth;
                c.height = canvasHeight;
                const cx = c.getContext('2d');
                const bgGrad = cx.createRadialGradient(canvasWidth * 0.3, canvasHeight * 0.35, canvasWidth * 0.1,
                    canvasWidth * 0.5, canvasHeight * 0.5, canvasWidth * 0.9);
                bgGrad.addColorStop(0, '#1a2a3a');
                bgGrad.addColorStop(0.5, '#0d1b2a');
                bgGrad.addColorStop(1, '#050d15');
                cx.fillStyle = bgGrad;
                cx.fillRect(0, 0, canvasWidth, canvasHeight);
                for (let i = 0; i < 180; i++) {
                    const sx = Math.random() * canvasWidth;
                    const sy = Math.random() * canvasHeight;
                    const sr = Math.random() * 1.8 + 0.3;
                    cx.beginPath();
                    cx.arc(sx, sy, sr, 0, Math.PI * 2);
                    cx.fillStyle = `rgba(200,210,240,${Math.random() * 0.7 + 0.2})`;
                    cx.fill();
                }
                for (let i = 0; i < 25; i++) {
                    const sx = Math.random() * canvasWidth;
                    const sy = Math.random() * canvasHeight;
                    const sr = Math.random() * 2.5 + 1;
                    cx.beginPath();
                    cx.arc(sx, sy, sr, 0, Math.PI * 2);
                    cx.fillStyle = `rgba(255,250,235,${Math.random()*0.6+0.4})`;
                    cx.fill();
                    const glow = cx.createRadialGradient(sx, sy, sr * 0.3, sx, sy, sr * 3);
                    glow.addColorStop(0, 'rgba(255,250,235,0.5)');
                    glow.addColorStop(1, 'rgba(255,250,235,0)');
                    cx.fillStyle = glow;
                    cx.fillRect(sx - sr * 3, sy - sr * 3, sr * 6, sr * 6);
                }
                return c;
            }

            function createDefaultMaskImage() {
                const c = document.createElement('canvas');
                c.width = canvasWidth;
                c.height = canvasHeight;
                const cx = c.getContext('2d');
                const grad = cx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
                grad.addColorStop(0, '#f5d78c');
                grad.addColorStop(0.35, '#e8b860');
                grad.addColorStop(0.65, '#d4943a');
                grad.addColorStop(1, '#c07828');
                cx.fillStyle = grad;
                cx.fillRect(0, 0, canvasWidth, canvasHeight);
                for (let i = 0; i < 300; i++) {
                    const tx = Math.random() * canvasWidth;
                    const ty = Math.random() * canvasHeight;
                    const tr = Math.random() * 20 + 3;
                    cx.beginPath();
                    cx.arc(tx, ty, tr, 0, Math.PI * 2);
                    cx.fillStyle = `rgba(255,255,255,${Math.random() * 0.08})`;
                    cx.fill();
                }
                for (let i = 0; i < 12; i++) {
                    const bx = Math.random() * canvasWidth;
                    const by = Math.random() * canvasHeight;
                    const br = Math.random() * 80 + 30;
                    const bgrad = cx.createRadialGradient(bx, by, 0, bx, by, br);
                    bgrad.addColorStop(0, `rgba(255,240,210,0.3)`);
                    bgrad.addColorStop(1, `rgba(200,150,80,0)`);
                    cx.fillStyle = bgrad;
                    cx.fillRect(bx - br, by - br, br * 2, br * 2);
                }
                return c;
            }

            async function loadDefaultImages() {
                const bgCanvas = createDefaultBgImage();
                bgImage = new Image();
                bgImage.src = bgCanvas.toDataURL();

                const maskCanvas = createDefaultMaskImage();
                const img = new Image();
                img.src = maskCanvas.toDataURL();

                await Promise.all([
                    new Promise(r => { bgImage.onload = r; bgImage.onerror = r; }),
                    new Promise(r => { img.onload = r; img.onerror = r; })
                ]);

                if (maskElement && maskType === 'video') {
                    maskElement.pause();
                    if (maskElement.parentNode) maskElement.parentNode.removeChild(maskElement);
                    if (maskObjectURL) URL.revokeObjectURL(maskObjectURL);
                }
                maskElement = img;
                maskType = 'image';
                maskReady = true;
                maskObjectURL = null;
            }

            function drawMediaCover(ctx, media, cw, ch) {
                if (!media) return;
                const isVideo = media.tagName === 'VIDEO';
                const mediaWidth = isVideo ? media.videoWidth : media.naturalWidth;
                const mediaHeight = isVideo ? media.videoHeight : media.naturalHeight;
                if (!mediaWidth || !mediaHeight) return;
                const imgRatio = mediaWidth / mediaHeight;
                const canvasRatio = cw / ch;
                let dw, dh, dx, dy;
                if (imgRatio > canvasRatio) {
                    dh = ch;
                    dw = dh * imgRatio;
                    dx = -(dw - cw) / 2;
                    dy = 0;
                } else {
                    dw = cw;
                    dh = dw / imgRatio;
                    dx = 0;
                    dy = -(dh - ch) / 2;
                }
                ctx.drawImage(media, dx, dy, dw, dh);
            }

            // ---------- 蒙版上传（修复移动端视频播放） ----------
            async function handleMaskUpload(file) {
                if (!file) return;
                if (maskObjectURL) {
                    URL.revokeObjectURL(maskObjectURL);
                    maskObjectURL = null;
                }
                if (maskElement && maskType === 'video') {
                    maskElement.pause();
                    maskElement.removeAttribute('src');
                    if (maskElement.parentNode) maskElement.parentNode.removeChild(maskElement);
                }
                maskReady = false;
                const url = URL.createObjectURL(file);
                maskObjectURL = url;

                if (file.type.startsWith('image/')) {
                    const img = new Image();
                    img.onload = () => {
                        maskElement = img;
                        maskType = 'image';
                        maskReady = true;
                        hintText.textContent = '🖼️ 图片蒙版已加载';
                    };
                    img.onerror = () => {
                        alert('蒙版图片加载失败');
                        maskReady = false;
                    };
                    img.src = url;
                } else if (file.type.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.muted = true;
                    video.loop = true;
                    video.playsInline = true;
                    video.autoplay = true;
                    video.setAttribute('playsinline', '');
                    video.setAttribute('muted', '');
                    video.style.display = 'none';
                    document.body.appendChild(video);   // ✅ 关键：添加到 DOM 使移动端可自动播放
                    video.preload = 'auto';

                    video.onloadeddata = () => {
                        maskElement = video;
                        maskType = 'video';
                        maskReady = true;
                        hintText.textContent = '🎥 视频蒙版已加载（若未动，请轻点画面）';
                        video.play().catch(() => {
                            hintText.textContent = '👉 点击画面开始播放视频蒙版';
                        });
                    };
                    video.onerror = () => {
                        alert('蒙版视频加载失败，请检查格式');
                        maskReady = false;
                    };
                    video.src = url;
                } else {
                    alert('不支持的蒙版文件类型，请上传图片、GIF动图或视频');
                    URL.revokeObjectURL(url);
                    maskObjectURL = null;
                }
            }

            // ---------- 底图上传 ----------
            function handleBgUpload(file) {
                return new Promise((resolve, reject) => {
                    if (!file || !file.type.startsWith('image/')) {
                        reject(new Error('请上传图片文件'));
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            bgImage = img;
                            resolve(img);
                        };
                        img.onerror = () => reject(new Error('底图加载失败'));
                        img.src = e.target.result;
                    };
                    reader.onerror = () => reject(new Error('文件读取失败'));
                    reader.readAsDataURL(file);
                });
            }

            bgUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) handleBgUpload(file).catch(err => alert('底图上传失败: ' + err.message));
                bgUpload.value = '';
            });

            maskUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) handleMaskUpload(file);
                maskUpload.value = '';
            });

            resetBtn.addEventListener('click', async () => {
                await loadDefaultImages();
                hintText.textContent = '✅ 已恢复默认图片 | 移动手部或鼠标来探索';
            });

            // ---------- 点击画面激活视频（移动端兜底） ----------
            mainContainer.addEventListener('click', () => {
                if (maskType === 'video' && maskElement && maskElement.paused) {
                    maskElement.play().catch(() => {});
                    hintText.textContent = '🎬 视频蒙版已激活';
                }
            });

            // ---------- 滑块控制 ----------
            featherSlider.addEventListener('input', () => {
                featherPercent = parseInt(featherSlider.value);
                featherValue.textContent = featherPercent + '%';
            });
            radiusSlider.addEventListener('input', () => {
                baseRadius = parseInt(radiusSlider.value);
                radiusValue.textContent = baseRadius + 'px';
            });

            // ---------- Canvas 尺寸 ----------
            function updateCanvasSize() {
                const rect = mainContainer.getBoundingClientRect();
                mainCanvas.style.width = rect.width + 'px';
                mainCanvas.style.height = rect.height + 'px';
                if (rect.width < 500) {
                    cameraPreviewDiv.style.width = '56px';
                    cameraPreviewDiv.style.height = '42px';
                } else if (rect.width < 768) {
                    cameraPreviewDiv.style.width = '75px';
                    cameraPreviewDiv.style.height = '56px';
                } else {
                    cameraPreviewDiv.style.width = '100px';
                    cameraPreviewDiv.style.height = '75px';
                }
            }

            // ---------- 鼠标/触摸模拟 ----------
            function getMouseCanvasPos(e) {
                const rect = mainCanvas.getBoundingClientRect();
                const scaleX = canvasWidth / rect.width;
                const scaleY = canvasHeight / rect.height;
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            }

            mainCanvas.addEventListener('mousemove', (e) => {
                if (mouseMode) { mousePos = getMouseCanvasPos(e); mouseInCanvas = true; }
            });
            mainCanvas.addEventListener('mouseenter', () => { if (mouseMode) mouseInCanvas = true; });
            mainCanvas.addEventListener('mouseleave', () => { mouseInCanvas = false; mousePos = null; });
            mainCanvas.addEventListener('touchmove', (e) => {
                if (mouseMode && e.touches.length > 0) {
                    e.preventDefault();
                    mousePos = getMouseCanvasPos(e.touches[0]);
                    mouseInCanvas = true;
                }
            }, { passive: false });
            mainCanvas.addEventListener('touchend', () => { if (mouseMode) { mouseInCanvas = false; mousePos = null; } });

            // ---------- 渲染 ----------
            function render() {
                const cw = canvasWidth;
                const ch = canvasHeight;
                ctx.clearRect(0, 0, cw, ch);

                if (bgImage && bgImage.complete && bgImage.naturalWidth > 0) {
                    drawMediaCover(ctx, bgImage, cw, ch);
                } else {
                    ctx.fillStyle = '#1a1a2e';
                    ctx.fillRect(0, 0, cw, ch);
                }

                let spotlightSources = [];
                if (cameraActive && !mouseMode && detectedHands.length > 0) {
                    spotlightSources = detectedHands.map(h => ({
                        cx: h.cx * cw,
                        cy: h.cy * ch,
                        radius: baseRadius,
                    }));
                } else if (mouseMode && mouseInCanvas && mousePos) {
                    spotlightSources = [{ cx: mousePos.x, cy: mousePos.y, radius: baseRadius }];
                }

                if (spotlightSources.length > 0 && maskReady && maskElement) {
                    if (!offscreenCanvas || offscreenCanvas.width !== cw || offscreenCanvas.height !== ch) {
                        offscreenCanvas = document.createElement('canvas');
                        offscreenCanvas.width = cw;
                        offscreenCanvas.height = ch;
                        offscreenCtx = offscreenCanvas.getContext('2d');
                    }

                    for (const source of spotlightSources) {
                        const { cx, cy, radius } = source;
                        const featherRadius = radius * (featherPercent / 100);
                        const innerRadius = Math.max(0, radius - featherRadius);
                        const outerRadius = radius;
                        if (outerRadius <= 0) continue;

                        offscreenCtx.clearRect(0, 0, cw, ch);
                        drawMediaCover(offscreenCtx, maskElement, cw, ch);

                        const gradient = offscreenCtx.createRadialGradient(cx, cy, innerRadius, cx, cy, outerRadius);
                        gradient.addColorStop(0, 'rgba(255,255,255,1)');
                        gradient.addColorStop(0.85, 'rgba(255,255,255,0.95)');
                        gradient.addColorStop(1, 'rgba(255,255,255,0)');

                        offscreenCtx.globalCompositeOperation = 'destination-in';
                        offscreenCtx.fillStyle = gradient;
                        offscreenCtx.fillRect(0, 0, cw, ch);
                        offscreenCtx.globalCompositeOperation = 'source-over';

                        ctx.drawImage(offscreenCanvas, 0, 0);
                    }
                }

                animationId = requestAnimationFrame(render);
            }

            // ---------- MediaPipe ----------
            function initMediaPipe() {
                if (typeof Hands === 'undefined') { switchToMouseMode('MediaPipe库加载失败'); return; }
                handsInstance = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
                });
                handsInstance.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.5,
                });
                handsInstance.onResults(onHandResults);

                if (typeof Camera === 'undefined') { switchToMouseMode('摄像头工具加载失败'); return; }
                cameraInstance = new Camera(hiddenVideo, {
                    onFrame: async () => {
                        if (handsInstance && cameraActive) {
                            try { await handsInstance.send({ image: hiddenVideo }); } catch (e) {}
                        }
                    },
                    width: canvasWidth,
                    height: canvasHeight,
                    facingMode: 'user',
                });
                cameraInstance.start().then(() => {
                    cameraActive = true;
                    mouseMode = false;
                    updateStatus('active', 'AI摄像头已就绪');
                    previewVideo.srcObject = hiddenVideo.srcObject;
                    cameraPreviewDiv.style.display = 'block';
                }).catch(() => switchToMouseMode('摄像头权限未授予'));
            }

            function onHandResults(results) {
                if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                    if (Date.now() - lastHandDetectionTime > HAND_TIMEOUT_MS) detectedHands = [];
                    updateHandCountUI(0);
                    return;
                }
                lastHandDetectionTime = Date.now();
                const newDetectedHands = [];
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const lm = results.multiHandLandmarks[i];
                    const cx = (lm[0].x + lm[5].x + lm[9].x + lm[13].x + lm[17].x) / 5;
                    const cy = (lm[0].y + lm[5].y + lm[9].y + lm[13].y + lm[17].y) / 5;
                    newDetectedHands.push({ cx: 1 - cx, cy });
                }
                if (smoothedHands.length === 0) smoothedHands = newDetectedHands.map(h => ({...h}));
                else {
                    const alpha = 0.35;
                    smoothedHands = newDetectedHands.map((h, i) => ({
                        cx: smoothedHands[i] ? smoothedHands[i].cx * (1 - alpha) + h.cx * alpha : h.cx,
                        cy: smoothedHands[i] ? smoothedHands[i].cy * (1 - alpha) + h.cy * alpha : h.cy,
                    }));
                }
                detectedHands = smoothedHands;
                updateHandCountUI(detectedHands.length);
            }

            function updateHandCountUI(count) {
                handCountEl.textContent = count;
                handBadge.style.opacity = count > 0 ? '1' : (cameraActive ? '0.5' : '0.4');
            }

            function switchToMouseMode(reason) {
                mouseMode = true;
                cameraActive = false;
                detectedHands = [];
                smoothedHands = [];
                updateStatus('warning', '鼠标模拟模式');
                hintText.textContent = '🖱️ ' + reason + ' | 移动鼠标/手指控制光圈';
                cameraPreviewDiv.style.display = 'none';
            }

            function updateStatus(state, text) {
                statusDot.className = 'status-dot';
                if (state === 'active') statusDot.classList.add('active');
                else if (state === 'warning') statusDot.classList.add('warning');
                statusText.textContent = text;
            }

            // ---------- 初始化 ----------
            async function init() {
                updateCanvasSize();
                mainCanvas.width = canvasWidth;
                mainCanvas.height = canvasHeight;
                offscreenCanvas = document.createElement('canvas');
                offscreenCanvas.width = canvasWidth;
                offscreenCanvas.height = canvasHeight;
                offscreenCtx = offscreenCanvas.getContext('2d');

                await loadDefaultImages();
                try { initMediaPipe(); } catch (e) { switchToMouseMode('初始化异常'); }
                setTimeout(() => { if (!cameraActive && !mouseMode) switchToMouseMode('摄像头启动超时'); }, 4000);
                render();
                window.addEventListener('resize', updateCanvasSize);
            }

            function cleanup() {
                if (animationId) cancelAnimationFrame(animationId);
                if (cameraInstance && cameraActive) { try { cameraInstance.stop(); } catch (e) {} }
                if (handsInstance) { try { handsInstance.close(); } catch (e) {} }
                if (hiddenVideo && hiddenVideo.srcObject) {
                    hiddenVideo.srcObject.getTracks().forEach(t => t.stop());
                }
                if (maskObjectURL) URL.revokeObjectURL(maskObjectURL);
                if (maskElement && maskType === 'video') {
                    maskElement.pause();
                    maskElement.removeAttribute('src');
                    if (maskElement.parentNode) maskElement.parentNode.removeChild(maskElement);
                }
            }
            window.addEventListener('beforeunload', cleanup);
            window.addEventListener('pagehide', cleanup);

            init().catch(err => {
                console.error('初始化失败:', err);
                switchToMouseMode('系统初始化失败');
                if (!animationId) render();
            });
        })();
    </script>
</body>
</html>
