<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>手势糖葫芦 - 指尖串果</title>
    <style>
        :root {
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            width: 100vw;
            height: 100dvh;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: manipulation;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 摄像头视频隐藏，仅用于识别 */
        #videoElement {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            -webkit-transform: scaleX(-1);
            z-index: 0;
            pointer-events: none;
            opacity: 0;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: calc(30px + var(--safe-bottom));
        }

        #uiLayer.active {
            pointer-events: auto;
        }

        .ui-btn {
            pointer-events: auto;
            font-size: clamp(20px, 5.5vw, 28px);
            font-weight: 700;
            padding: 16px 48px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
            position: relative;
            z-index: 20;
        }

        .ui-btn:active {
            transform: scale(0.94);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        #btnStart {
            background: linear-gradient(135deg, #e63946, #c1121f);
            color: #fff;
            font-size: clamp(22px, 6vw, 32px);
            padding: 18px 56px;
            letter-spacing: 4px;
            animation: pulse-btn 2s ease-in-out infinite;
        }

        @keyframes pulse-btn {
            0%,
            100% {
                box-shadow: 0 8px 30px rgba(230, 57, 70, 0.5);
            }
            50% {
                box-shadow: 0 8px 50px rgba(230, 57, 70, 0.8), 0 0 80px rgba(255, 100, 100, 0.3);
            }
        }

        #btnRestart {
            background: linear-gradient(135deg, #f77f00, #e36414);
            color: #fff;
            font-size: clamp(20px, 5vw, 26px);
            padding: 16px 44px;
            animation: pulse-btn2 2s ease-in-out infinite;
        }

        @keyframes pulse-btn2 {
            0%,
            100% {
                box-shadow: 0 8px 30px rgba(247, 127, 0, 0.5);
            }
            50% {
                box-shadow: 0 8px 50px rgba(247, 127, 0, 0.75), 0 0 70px rgba(255, 160, 30, 0.3);
            }
        }

        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            letter-spacing: 2px;
        }
        #loadingOverlay .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255, 255, 255, 0.25);
            border-top-color: #e63946;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 18px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #loadingOverlay .load-text {
            font-size: 15px;
            opacity: 0.8;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- 摄像头画面（隐藏） -->
        <video id="videoElement" playsinline autoplay muted></video>

        <!-- 游戏画布 -->
        <canvas id="gameCanvas"></canvas>

        <!-- UI层 -->
        <div id="uiLayer" class="active">
            <button id="btnStart" class="ui-btn">开 始 游 戏</button>
            <button id="btnRestart" class="ui-btn hidden">再 来 一 次</button>
        </div>

        <!-- 加载遮罩 -->
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <span>模型加载中...</span>
            <span class="load-text">首次加载可能需要几秒</span>
        </div>
    </div>

    <!-- MediaPipe Hands CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6.1675466024/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>

    <script>
        (function() {
            // ==================== DOM元素 ====================
            const videoEl = document.getElementById('videoElement');
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const uiLayer = document.getElementById('uiLayer');
            const btnStart = document.getElementById('btnStart');
            const btnRestart = document.getElementById('btnRestart');
            const loadingOverlay = document.getElementById('loadingOverlay');

            // ==================== 游戏常量 ====================
            const TOTAL_TO_WIN = 7;
            const BOMB_PROBABILITY = 0.18;
            const ITEM_RADIUS = 15; // 稍微放大掉落物半径 (原为13)
            const STICK_WIDTH = 5;
            const STICK_HEIGHT_RATIO = 0.40;
            const COLLISION_THRESHOLD = ITEM_RADIUS + 8; // 碰撞阈值自动适应
            const BASE_FALL_SPEED = 290;
            const MAX_FALL_SPEED = 440;
            const SPAWN_INTERVAL_MIN = 0.7;
            const SPAWN_INTERVAL_MAX = 1.6;

            // 签子上水果堆积的起始位置（从底部往上2/3处）
            let stickFirstFruitY = 0;

            // ==================== 游戏状态 ====================
            const STATE = { START: 'start', PLAYING: 'playing', WIN: 'win', EXPLODING: 'exploding' };
            let gameState = STATE.START;

            // ==================== 手部追踪数据 ====================
            let fingerDetected = false;
            let rawFingerScreenX = 0;
            let rawFingerScreenY = 0;
            let smoothedStickX = 0;
            let stickTargetX = 0;

            // ==================== 游戏数据 ====================
            let collectedItems = [];
            let fallingItems = [];
            let particles = [];
            let score = 0;
            let spawnTimer = 0;
            let nextSpawnTime = 0;
            let lastTime = 0;
            let explosionTimer = 0;
            const EXPLOSION_DURATION = 1.3;
            let screenW = 0;
            let screenH = 0;
            let stickTopY = 0;
            let stickBottomY = 0;
            let stickX = 0;
            let dpr = 1;

            // 离屏背景画布
            let bgCanvas = null;
            let bgCtx = null;

            // ==================== 音效系统 ====================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        audioCtx = null;
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playBeep(freq, duration, type = 'sine', vol = 0.15, glideTo = null) {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, now);
                    if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, now + duration);
                    gain.gain.setValueAtTime(vol, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + duration);
                } catch (e) { /* 静默 */ }
            }

            function playCollectSound() {
                playBeep(880, 0.10, 'sine', 0.18);
                setTimeout(() => playBeep(1100, 0.08, 'sine', 0.14), 60);
            }

            function playBombSound() {
                playBeep(55, 0.55, 'sawtooth', 0.35, 15);
                setTimeout(() => playBeep(30, 0.4, 'triangle', 0.25), 100);
            }

            function playWinSound() {
                const notes = [523, 659, 784, 1047, 784, 1047, 1319];
                notes.forEach((freq, i) => {
                    setTimeout(() => playBeep(freq, 0.15, 'sine', 0.16), i * 100);
                });
            }

            // ==================== 生成水果纹样背景（稀疏版） ====================
            function createBackgroundTexture() {
                bgCanvas = document.createElement('canvas');
                bgCanvas.width = screenW;
                bgCanvas.height = screenH;
                bgCtx = bgCanvas.getContext('2d');

                // 白色底
                bgCtx.fillStyle = '#fef9f2';
                bgCtx.fillRect(0, 0, screenW, screenH);

                // 散布少量水果小图案 (数量减少至原来的1/32)
                const fruitColors = ['#e63946', '#f77f00', '#6a994e', '#d43535'];
                const fruitCount = Math.floor((screenW * screenH) / 57600); // 原分母1800，乘以32

                for (let i = 0; i < fruitCount; i++) {
                    const x = Math.random() * screenW;
                    const y = Math.random() * screenH;
                    const radius = 4 + Math.random() * 6;
                    const color = fruitColors[Math.floor(Math.random() * fruitColors.length)];

                    bgCtx.fillStyle = color;
                    bgCtx.beginPath();
                    bgCtx.arc(x, y, radius, 0, Math.PI * 2);
                    bgCtx.fill();

                    bgCtx.fillStyle = 'rgba(255,255,255,0.5)';
                    bgCtx.beginPath();
                    bgCtx.arc(x - radius * 0.25, y - radius * 0.3, radius * 0.3, 0, Math.PI * 2);
                    bgCtx.fill();

                    if (Math.random() > 0.5) {
                        const stemLength = radius * 0.7;
                        bgCtx.strokeStyle = '#5d7a3a';
                        bgCtx.lineWidth = 1.2;
                        bgCtx.beginPath();
                        bgCtx.moveTo(x, y - radius);
                        bgCtx.quadraticCurveTo(x + 2, y - radius - stemLength, x + 1, y - radius - stemLength - 1);
                        bgCtx.stroke();
                    }
                }
            }

            // ==================== Canvas尺寸适配 ====================
            function resizeCanvas() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                screenW = window.innerWidth;
                screenH = window.innerHeight;
                canvas.style.width = screenW + 'px';
                canvas.style.height = screenH + 'px';
                canvas.width = Math.floor(screenW * dpr);
                canvas.height = Math.floor(screenH * dpr);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);

                // 更新签子参数
                stickBottomY = screenH - 25;
                stickTopY = screenH - (screenH * STICK_HEIGHT_RATIO) - 15;
                if (stickTopY < screenH * 0.35) stickTopY = screenH * 0.35;

                // 计算第一个水果在签子2/3处（从底部算）
                const stickHeight = stickBottomY - stickTopY;
                stickFirstFruitY = stickBottomY - stickHeight * (2 / 3);

                if (stickX === 0 || stickX > screenW) {
                    stickX = screenW / 2;
                    smoothedStickX = stickX;
                    stickTargetX = stickX;
                }
                stickX = Math.max(40, Math.min(screenW - 40, stickX));
                smoothedStickX = stickX;
                stickTargetX = stickX;

                // 重新生成稀疏背景
                createBackgroundTexture();
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
            });
            window.addEventListener('orientationchange', () => {
                setTimeout(resizeCanvas, 300);
            });

            // ==================== MediaPipe Hands ====================
            let hands = null;
            let camera = null;

            function initMediaPipe() {
                return new Promise((resolve, reject) => {
                    try {
                        hands = new Hands({
                            locateFile: (file) =>
                                `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
                        });

                        hands.setOptions({
                            maxNumHands: 1,
                            modelComplexity: 0,
                            minDetectionConfidence: 0.65,
                            minTrackingConfidence: 0.45,
                        });

                        hands.onResults(onHandResults);

                        camera = new Camera(videoEl, {
                            onFrame: async () => {
                                if (hands && videoEl.readyState >= 2) {
                                    await hands.send({ image: videoEl });
                                }
                            },
                            width: 640,
                            height: 480,
                            facingMode: 'user',
                        });

                        camera.start().then(() => {
                            console.log('摄像头已启动（背景隐藏）');
                            resolve();
                        }).catch((err) => {
                            console.warn('摄像头启动失败，尝试备用分辨率:', err);
                            const camera2 = new Camera(videoEl, {
                                onFrame: async () => {
                                    if (hands && videoEl.readyState >= 2) {
                                        await hands.send({ image: videoEl });
                                    }
                                },
                                width: 320,
                                height: 240,
                                facingMode: 'user',
                            });
                            camera = camera2;
                            return camera.start().then(resolve).catch(reject);
                        });
                    } catch (e) {
                        reject(e);
                    }
                });
            }

            function onHandResults(results) {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    const indexTip = landmarks[8];
                    const mirroredX = 1 - indexTip.x;
                    rawFingerScreenX = mirroredX * screenW;
                    rawFingerScreenY = indexTip.y * screenH;
                    fingerDetected = true;
                } else {
                    fingerDetected = false;
                }
            }

            // ==================== 游戏逻辑 ====================
            function getRandomItemType() {
                const rand = Math.random();
                if (rand < BOMB_PROBABILITY) return 'bomb';
                const fruitRand = Math.random();
                if (fruitRand < 0.25) return 'tanghulu';
                if (fruitRand < 0.5) return 'apple';
                if (fruitRand < 0.75) return 'orange';
                return 'grape';
            }

            function getItemColor(type) {
                switch (type) {
                    case 'tanghulu': return '#d43535';
                    case 'apple': return '#e63946';
                    case 'orange': return '#f77f00';
                    case 'grape': return '#6a994e';
                    case 'bomb': return '#1a1a1a';
                    default: return '#e63946';
                }
            }

            function spawnItem() {
                const type = getRandomItemType();
                const color = getItemColor(type);
                const margin = ITEM_RADIUS + 10;
                const x = margin + Math.random() * (screenW - margin * 2);
                const y = -ITEM_RADIUS - Math.random() * 40;
                const speedVariation = 0.85 + Math.random() * 0.3;
                const baseSpeed = BASE_FALL_SPEED + (score * 18);
                const speed = Math.min(baseSpeed, MAX_FALL_SPEED) * speedVariation;

                fallingItems.push({
                    type: type,
                    color: color,
                    x: x,
                    y: y,
                    speed: speed,
                    radius: ITEM_RADIUS,
                    wobble: Math.random() * Math.PI * 2,
                    wobbleSpeed: 0.3 + Math.random() * 0.7,
                    wobbleAmp: 3 + Math.random() * 8,
                });
            }

            function resetGameData() {
                collectedItems = [];
                fallingItems = [];
                particles = [];
                score = 0;
                spawnTimer = 0;
                nextSpawnTime = 0.6 + Math.random() * 0.5;
                explosionTimer = 0;
                stickX = screenW / 2;
                smoothedStickX = stickX;
                stickTargetX = stickX;
            }

            function startGame() {
                initAudio();
                resetGameData();
                gameState = STATE.PLAYING;
                btnStart.classList.add('hidden');
                btnRestart.classList.add('hidden');
                uiLayer.classList.remove('active');
                lastTime = performance.now();
                spawnTimer = 0;
                nextSpawnTime = 0.4;
            }

            function triggerExplosion(bombItem) {
                initAudio();
                playBombSound();
                gameState = STATE.EXPLODING;
                explosionTimer = 0;

                const cx = bombItem.x;
                const cy = bombItem.y;
                const particleCount = 35;
                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 * i) / particleCount + Math.random() * 0.3;
                    const dist = 80 + Math.random() * 180;
                    const speed = 250 + Math.random() * 500;
                    particles.push({
                        x: cx,
                        y: cy,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 0.5 + Math.random() * 0.9,
                        maxLife: 0.5 + Math.random() * 0.9,
                        radius: 3 + Math.random() * 10,
                        color: ['#ff4444', '#ff8800', '#ffcc00', '#ff6600', '#333333'][Math.floor(Math.random() * 5)],
                    });
                }
                fallingItems = fallingItems.filter(item => item !== bombItem);
                collectedItems = [];
                score = 0;
            }

            function winGame() {
                initAudio();
                playWinSound();
                gameState = STATE.WIN;
                btnRestart.classList.remove('hidden');
                btnStart.classList.add('hidden');
                uiLayer.classList.add('active');
                const cx = screenW / 2;
                const cy = screenH * 0.35;
                for (let i = 0; i < 50; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 40 + Math.random() * 200;
                    const speed = 120 + Math.random() * 300;
                    particles.push({
                        x: cx + (Math.random() - 0.5) * 200,
                        y: cy,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 200,
                        life: 1.2 + Math.random() * 1.8,
                        maxLife: 1.2 + Math.random() * 1.8,
                        radius: 4 + Math.random() * 8,
                        color: ['#ff4444', '#ff8800', '#ffcc00', '#44ff44', '#ff66aa', '#66ccff'][Math.floor(Math.random() * 6)],
                    });
                }
            }

            function restartGame() {
                resetGameData();
                btnRestart.classList.add('hidden');
                btnStart.classList.remove('hidden');
                uiLayer.classList.add('active');
                gameState = STATE.START;
                particles = [];
                fallingItems = [];
            }

            // ==================== 碰撞检测 ====================
            function checkCollision(item) {
                const itemBottom = item.y + item.radius;
                const stickTopReachY = stickTopY - 4;
                const stickTopEndY = stickTopY + 14;

                if (itemBottom >= stickTopReachY && itemBottom <= stickTopEndY + item.radius) {
                    const horizontalDist = Math.abs(item.x - stickX);
                    if (horizontalDist < COLLISION_THRESHOLD) return true;
                }
                if (item.y > stickTopY - 2 && item.y < stickTopY + 20) {
                    const horizontalDist = Math.abs(item.x - stickX);
                    if (horizontalDist < COLLISION_THRESHOLD * 0.85) return true;
                }
                return false;
            }

            // ==================== 更新循环 ====================
            function update(dt) {
                if (gameState === STATE.EXPLODING) {
                    explosionTimer += dt;
                    for (let p of particles) {
                        p.x += p.vx * dt;
                        p.y += p.vy * dt;
                        p.vy += 350 * dt;
                        p.life -= dt;
                    }
                    particles = particles.filter(p => p.life > 0);
                    if (explosionTimer >= EXPLOSION_DURATION) {
                        restartGame();
                    }
                    return;
                }

                if (gameState === STATE.WIN) {
                    for (let p of particles) {
                        p.x += p.vx * dt;
                        p.y += p.vy * dt;
                        p.vy += 180 * dt;
                        p.life -= dt;
                    }
                    particles = particles.filter(p => p.life > 0);
                    return;
                }

                if (gameState !== STATE.PLAYING) return;

                if (fingerDetected) {
                    stickTargetX = rawFingerScreenX;
                }
                const lerpFactor = 1 - Math.exp(-12 * dt);
                smoothedStickX += (stickTargetX - smoothedStickX) * Math.min(lerpFactor * 1.3, 1);
                stickX = Math.max(ITEM_RADIUS + 5, Math.min(screenW - ITEM_RADIUS - 5, smoothedStickX));

                spawnTimer += dt;
                if (spawnTimer >= nextSpawnTime && fallingItems.length < 12) {
                    spawnItem();
                    spawnTimer = 0;
                    nextSpawnTime = SPAWN_INTERVAL_MIN + Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN);
                    if (score >= 5) nextSpawnTime *= 0.7;
                }

                for (let i = fallingItems.length - 1; i >= 0; i--) {
                    const item = fallingItems[i];
                    item.y += item.speed * dt;
                    item.wobble += item.wobbleSpeed * dt;
                    item.x += Math.sin(item.wobble) * item.wobbleAmp * dt;

                    if (checkCollision(item)) {
                        if (item.type === 'bomb') {
                            triggerExplosion(item);
                            return;
                        } else {
                            playCollectSound();
                            collectedItems.push({
                                type: item.type,
                                color: item.color,
                            });
                            score = collectedItems.length;
                            const cx = item.x;
                            const cy = item.y;
                            for (let j = 0; j < 8; j++) {
                                particles.push({
                                    x: cx,
                                    y: cy,
                                    vx: (Math.random() - 0.5) * 180,
                                    vy: -80 - Math.random() * 200,
                                    life: 0.35,
                                    maxLife: 0.35,
                                    radius: 2 + Math.random() * 4,
                                    color: item.color,
                                });
                            }
                            fallingItems.splice(i, 1);

                            if (score >= TOTAL_TO_WIN) {
                                winGame();
                                return;
                            }
                        }
                        continue;
                    }

                    if (item.y - item.radius > screenH + 50) {
                        fallingItems.splice(i, 1);
                    }
                }

                for (let p of particles) {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 300 * dt;
                    p.life -= dt;
                }
                particles = particles.filter(p => p.life > 0);
            }

            // ==================== 绘制函数 ====================
            function drawStick() {
                const sx = stickX;
                const topY = stickTopY;
                const bottomY = stickBottomY;

                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.25)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 3;

                const stickGrad = ctx.createLinearGradient(sx - STICK_WIDTH / 2, 0, sx + STICK_WIDTH / 2, 0);
                stickGrad.addColorStop(0, '#c49a6c');
                stickGrad.addColorStop(0.3, '#e8c9a0');
                stickGrad.addColorStop(0.5, '#f0d8b8');
                stickGrad.addColorStop(0.7, '#d4a878');
                stickGrad.addColorStop(1, '#a0724a');
                ctx.fillStyle = stickGrad;
                ctx.beginPath();
                ctx.roundRect(sx - STICK_WIDTH / 2, topY, STICK_WIDTH, bottomY - topY, STICK_WIDTH / 2);
                ctx.fill();
                ctx.restore();

                // 尖端
                ctx.fillStyle = '#d4a878';
                ctx.beginPath();
                ctx.moveTo(sx, topY - 10);
                ctx.lineTo(sx - STICK_WIDTH / 2 - 1, topY + 4);
                ctx.lineTo(sx + STICK_WIDTH / 2 + 1, topY + 4);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#f5e0c8';
                ctx.beginPath();
                ctx.moveTo(sx, topY - 8);
                ctx.lineTo(sx - STICK_WIDTH / 3, topY + 2);
                ctx.lineTo(sx + STICK_WIDTH / 3, topY + 2);
                ctx.closePath();
                ctx.fill();
            }

            function drawCollectedItems() {
                const count = collectedItems.length;
                if (count === 0) return;

                const spacing = ITEM_RADIUS * 2.15;
                let baseY = stickFirstFruitY;
                const maxTopLimit = stickTopY + ITEM_RADIUS + 4;
                const neededHeight = (count - 1) * spacing;
                if (baseY - neededHeight < maxTopLimit) {
                    baseY = maxTopLimit + neededHeight;
                    if (baseY > stickBottomY - ITEM_RADIUS) baseY = stickBottomY - ITEM_RADIUS;
                }

                for (let i = 0; i < count; i++) {
                    const item = collectedItems[i];
                    const iy = baseY - i * spacing;
                    const ix = stickX;

                    ctx.save();
                    ctx.shadowColor = 'rgba(0,0,0,0.25)';
                    ctx.shadowBlur = 5;
                    ctx.shadowOffsetX = 1;
                    ctx.shadowOffsetY = 2;

                    const grad = ctx.createRadialGradient(ix - 3, iy - 3, ITEM_RADIUS * 0.1, ix, iy, ITEM_RADIUS);
                    grad.addColorStop(0, lightenColor(item.color, 40));
                    grad.addColorStop(0.6, item.color);
                    grad.addColorStop(1, darkenColor(item.color, 30));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(ix, iy, ITEM_RADIUS, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                    ctx.fillStyle = 'rgba(255,255,255,0.45)';
                    ctx.beginPath();
                    ctx.arc(ix - ITEM_RADIUS * 0.3, iy - ITEM_RADIUS * 0.35, ITEM_RADIUS * 0.28, 0, Math.PI * 2);
                    ctx.fill();

                    if (item.type === 'apple') {
                        ctx.strokeStyle = '#5d3a1a';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(ix, iy - ITEM_RADIUS);
                        ctx.quadraticCurveTo(ix + 4, iy - ITEM_RADIUS - 7, ix + 1, iy - ITEM_RADIUS - 9);
                        ctx.stroke();
                        ctx.fillStyle = '#3d7a28';
                        ctx.beginPath();
                        ctx.arc(ix + 1, iy - ITEM_RADIUS - 9, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    if (item.type === 'orange') {
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        for (let d = 0; d < 3; d++) {
                            const dx = ix + (d - 1) * ITEM_RADIUS * 0.45;
                            const dy = iy - ITEM_RADIUS * 0.2 + d * ITEM_RADIUS * 0.2;
                            ctx.beginPath();
                            ctx.arc(dx, dy, 1.8, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    if (item.type === 'grape') {
                        ctx.fillStyle = 'rgba(255,255,255,0.35)';
                        ctx.beginPath();
                        ctx.arc(ix - ITEM_RADIUS * 0.3, iy - ITEM_RADIUS * 0.3, ITEM_RADIUS * 0.22, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    if (item.type === 'tanghulu') {
                        ctx.fillStyle = 'rgba(255,255,255,0.5)';
                        ctx.beginPath();
                        ctx.arc(ix - ITEM_RADIUS * 0.25, iy - ITEM_RADIUS * 0.3, ITEM_RADIUS * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            function drawFallingItems() {
                for (const item of fallingItems) {
                    const ix = item.x;
                    const iy = item.y;

                    ctx.save();
                    ctx.shadowColor = 'rgba(0,0,0,0.25)';
                    ctx.shadowBlur = 5;
                    ctx.shadowOffsetX = 1;
                    ctx.shadowOffsetY = 2;

                    if (item.type === 'bomb') {
                        const grad = ctx.createRadialGradient(ix - 2, iy - 2, ITEM_RADIUS * 0.05, ix, iy, ITEM_RADIUS);
                        grad.addColorStop(0, '#4a4a4a');
                        grad.addColorStop(0.7, '#1a1a1a');
                        grad.addColorStop(1, '#000000');
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(ix, iy, ITEM_RADIUS + 1, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.strokeStyle = '#888';
                        ctx.lineWidth = 2.5;
                        ctx.beginPath();
                        ctx.moveTo(ix, iy - ITEM_RADIUS - 1);
                        ctx.quadraticCurveTo(ix + 6, iy - ITEM_RADIUS - 10, ix + 2, iy - ITEM_RADIUS - 14);
                        ctx.stroke();

                        const sparkTime = performance.now() / 100;
                        const sparkAlpha = 0.6 + Math.sin(sparkTime * 15) * 0.4;
                        ctx.fillStyle = `rgba(255,180,30,${sparkAlpha})`;
                        ctx.beginPath();
                        ctx.arc(ix + 2, iy - ITEM_RADIUS - 14, 3.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = `rgba(255,255,200,${sparkAlpha})`;
                        ctx.beginPath();
                        ctx.arc(ix + 2, iy - ITEM_RADIUS - 14, 1.8, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        const grad = ctx.createRadialGradient(ix - 2, iy - 2, ITEM_RADIUS * 0.1, ix, iy, ITEM_RADIUS);
                        grad.addColorStop(0, lightenColor(item.color, 40));
                        grad.addColorStop(0.6, item.color);
                        grad.addColorStop(1, darkenColor(item.color, 30));
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(ix, iy, ITEM_RADIUS, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = 'rgba(255,255,255,0.4)';
                        ctx.beginPath();
                        ctx.arc(ix - ITEM_RADIUS * 0.3, iy - ITEM_RADIUS * 0.35, ITEM_RADIUS * 0.25, 0, Math.PI * 2);
                        ctx.fill();

                        if (item.type === 'apple') {
                            ctx.strokeStyle = '#5d3a1a';
                            ctx.lineWidth = 1.8;
                            ctx.beginPath();
                            ctx.moveTo(ix, iy - ITEM_RADIUS);
                            ctx.quadraticCurveTo(ix + 3, iy - ITEM_RADIUS - 6, ix + 1, iy - ITEM_RADIUS - 8);
                            ctx.stroke();
                        }
                    }
                    ctx.restore();
                }
            }

            function drawParticles() {
                for (const p of particles) {
                    const alpha = Math.max(0, p.life / p.maxLife);
                    const size = p.radius * alpha;
                    const hex = p.color;
                    const r = parseInt(hex.slice(1, 3), 16);
                    const g = parseInt(hex.slice(3, 5), 16);
                    const b = parseInt(hex.slice(5, 7), 16);
                    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.5, size), 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawScoreUI() {
                if (gameState !== STATE.PLAYING && gameState !== STATE.WIN) return;
                const badgeX = screenW - 70;
                const badgeY = Math.max(50, screenH * 0.06);
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.roundRect(badgeX - 25, badgeY - 16, 70, 38, 20);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 15px "PingFang SC","Noto Sans SC",sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`${score}/${TOTAL_TO_WIN}`, badgeX + 10, badgeY + 6);
                ctx.font = '13px sans-serif';
                ctx.fillText('🍡', badgeX - 8, badgeY + 7);
            }

            function drawOverlays() {
                if (gameState === STATE.START) {
                    const titleY = screenH * 0.18;
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.beginPath();
                    ctx.roundRect(screenW / 2 - 130, titleY - 35, 260, 70, 25);
                    ctx.fill();

                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold clamp(22px,6vw,30px) "PingFang SC","Noto Sans SC",sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('🍡 手势糖葫芦', screenW / 2, titleY + 2);
                    ctx.font = 'clamp(12px,3.5vw,16px) "PingFang SC","Noto Sans SC",sans-serif';
                    ctx.fillStyle = 'rgba(255,255,255,0.85)';
                    ctx.fillText('用食指控制签子，收集7个水果', screenW / 2, titleY + 26);

                    const tipY = screenH * 0.78;
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.font = 'clamp(11px,3vw,14px) "PingFang SC","Noto Sans SC",sans-serif';
                    ctx.fillText('👆 伸出食指在摄像头前移动', screenW / 2, tipY);
                    ctx.fillText('⚠️ 避开黑色炸弹', screenW / 2, tipY + 22);
                }

                if (gameState === STATE.WIN) {
                    const wy = screenH * 0.25;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.beginPath();
                    ctx.roundRect(screenW / 2 - 140, wy - 30, 280, 90, 25);
                    ctx.fill();

                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold clamp(24px,7vw,34px) "PingFang SC","Noto Sans SC",sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('🎉 恭喜通关！', screenW / 2, wy + 5);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'clamp(13px,3.5vw,17px) "PingFang SC","Noto Sans SC",sans-serif';
                    ctx.fillText('你的糖葫芦做好啦～', screenW / 2, wy + 35);
                }

                if (gameState === STATE.EXPLODING) {
                    const alpha = Math.max(0, 1 - explosionTimer / EXPLOSION_DURATION);
                    ctx.fillStyle = `rgba(255,30,30,${alpha * 0.4})`;
                    ctx.fillRect(0, 0, screenW, screenH);

                    const ey = screenH * 0.35;
                    ctx.fillStyle = `rgba(0,0,0,${alpha * 0.7})`;
                    ctx.beginPath();
                    ctx.roundRect(screenW / 2 - 120, ey - 22, 240, 55, 22);
                    ctx.fill();

                    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                    ctx.font = 'bold clamp(20px,5.5vw,28px) "PingFang SC","Noto Sans SC",sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('💥 炸弹爆炸！', screenW / 2, ey + 10);
                    ctx.fillStyle = `rgba(255,200,200,${alpha})`;
                    ctx.font = 'clamp(12px,3vw,15px) "PingFang SC","Noto Sans SC",sans-serif';
                    ctx.fillText('游戏结束，返回开始界面...', screenW / 2, ey + 32);
                }

                if (gameState === STATE.PLAYING && !fingerDetected) {
                    const alpha = 0.5 + Math.sin(performance.now() / 800) * 0.3;
                    const iy = screenH * 0.75;
                    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                    ctx.font = 'clamp(12px,3.2vw,15px) "PingFang SC","Noto Sans SC",sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('请将食指伸入摄像头范围', screenW / 2, iy);
                }
            }

            function draw() {
                ctx.clearRect(0, 0, screenW, screenH);

                // 绘制稀疏的白色水果纹样背景
                if (bgCanvas) {
                    ctx.drawImage(bgCanvas, 0, 0);
                } else {
                    ctx.fillStyle = '#fef9f2';
                    ctx.fillRect(0, 0, screenW, screenH);
                }

                // 签子与物品
                if (gameState === STATE.EXPLODING) {
                    ctx.globalAlpha = 0.3;
                    drawStick();
                    ctx.globalAlpha = 1;
                } else if (gameState === STATE.PLAYING || gameState === STATE.WIN || gameState === STATE.START) {
                    drawStick();
                    drawCollectedItems();
                }

                drawFallingItems();
                drawParticles();
                drawScoreUI();
                drawOverlays();
            }

            // ==================== 辅助函数 ====================
            function lightenColor(hex, percent) {
                const num = parseInt(hex.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.min(255, (num >> 16) + amt);
                const G = Math.min(255, ((num >> 8) & 0x00FF00) + amt);
                const B = Math.min(255, (num & 0x0000FF) + amt);
                return `rgb(${R},${G},${B})`;
            }

            function darkenColor(hex, percent) {
                const num = parseInt(hex.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.max(0, (num >> 16) - amt);
                const G = Math.max(0, ((num >> 8) & 0x00FF00) - amt);
                const B = Math.max(0, (num & 0x0000FF) - amt);
                return `rgb(${R},${G},${B})`;
            }

            // ==================== 事件处理 ====================
            btnStart.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                initAudio();
                startGame();
            });

            btnRestart.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                initAudio();
                resetGameData();
                btnRestart.classList.add('hidden');
                btnStart.classList.remove('hidden');
                uiLayer.classList.add('active');
                gameState = STATE.START;
                particles = [];
                fallingItems = [];
            });

            document.addEventListener('dblclick', (e) => e.preventDefault(), { passive: false });

            // ==================== 游戏循环 ====================
            function gameLoop(timestamp) {
                if (!lastTime) lastTime = timestamp;
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2;
                lastTime = timestamp;

                update(dt);
                draw();
                requestAnimationFrame(gameLoop);
            }

            // ==================== 初始化 ====================
            async function init() {
                resizeCanvas();
                stickX = screenW / 2;
                smoothedStickX = stickX;
                stickTargetX = stickX;
                lastTime = performance.now();

                loadingOverlay.classList.remove('hidden');

                try {
                    await initMediaPipe();
                    console.log('MediaPipe 初始化成功');
                } catch (err) {
                    console.error('MediaPipe 初始化失败:', err);
                    loadingOverlay.querySelector('.load-text').textContent = '加载失败，请刷新页面重试（需HTTPS）';
                    loadingOverlay.querySelector('.spinner').style.borderTopColor = '#ff4444';
                    setTimeout(() => loadingOverlay.classList.add('hidden'), 2500);
                    requestAnimationFrame(gameLoop);
                    return;
                }

                setTimeout(() => loadingOverlay.classList.add('hidden'), 600);

                gameState = STATE.START;
                btnStart.classList.remove('hidden');
                btnRestart.classList.add('hidden');
                uiLayer.classList.add('active');

                requestAnimationFrame(gameLoop);
            }

            init().catch((err) => {
                console.error('初始化失败:', err);
                loadingOverlay.querySelector('.load-text').textContent = '初始化失败，请检查摄像头权限并刷新页面';
                loadingOverlay.querySelector('.spinner').style.borderTopColor = '#ff4444';
                setTimeout(() => loadingOverlay.classList.add('hidden'), 3000);
                requestAnimationFrame(gameLoop);
            });

            console.log('🍡 手势糖葫芦游戏已就绪 (稀疏水果背景 + 掉落物稍大)');
        })();
    </script>
</body>
